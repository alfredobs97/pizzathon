<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="pizzathon">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>pizzathon</title>
  <link rel="manifest" href="manifest.json">

  <!-- Prevents browser caching -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <script>
    // Forcefully unregister service workers to prevent caching
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
          console.log('Service Worker unregistered');
        }
      });
    }
  </script>
</head>

<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    let c2paInstancePromise = null;

    window.readC2paFromBytes = async function (uint8Array, mimeType) {
      try {
        if (!c2paInstancePromise) {
          c2paInstancePromise = (async () => {
            const { createC2pa } = await import('https://esm.sh/@contentauth/c2pa-web@0.6.0/inline');
            const instance = await createC2pa();
            console.log('The c2paInstance is created!');
            return instance;
          })();
        }

        const c2paInstance = await c2paInstancePromise;
        const blob = new Blob([uint8Array], { type: mimeType });

        console.log('The blob is created! with this data', blob);

        // Use the new Reader API
        const reader = await c2paInstance.reader.fromBlob(blob.type || 'image/jpeg', blob);

        if (!reader) {
          console.log('No C2PA metadata found or unsupported format');
          return null;
        }

        const manifestStore = await reader.manifestStore();
        console.log('The manifestStore is created! with this data', manifestStore);

        // Free the reader resources
        await reader.free();

        if (manifestStore) {
          return JSON.stringify(manifestStore);
        }
        return null;
      } catch (e) {
        console.error('Error reading C2PA metadata:', e.toString());
        return null;
      }
    };
  </script>
</body>

</html>
