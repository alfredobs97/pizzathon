  <script>
    // Forcefully unregister service workers to prevent caching
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
          console.log('Service Worker unregistered');
        }

<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    let c2paInstancePromise = null;

    window.readC2paFromBytes = async function (uint8Array, mimeType) {
      try {
        if (!c2paInstancePromise) {
          c2paInstancePromise = (async () => {
            const { createC2pa } = await import('https://esm.sh/@contentauth/c2pa-web@0.6.0/inline');
            const instance = await createC2pa();
            console.log('The c2paInstance is created!');
            return instance;
          })();
        }

        const c2paInstance = await c2paInstancePromise;
        const blob = new Blob([uint8Array], { type: mimeType });

        console.log('The blob is created! with this data', blob);

        // Use the new Reader API
        const reader = await c2paInstance.reader.fromBlob(blob.type || 'image/jpeg', blob);

        if (!reader) {
          console.log('No C2PA metadata found or unsupported format');
          return null;
        }

        const manifestStore = await reader.manifestStore();
        console.log('The manifestStore is created! with this data', manifestStore);

        // Free the reader resources
        await reader.free();

        if (manifestStore) {
          return JSON.stringify(manifestStore);
        }
        return null;
      } catch (e) {
        console.error('Error reading C2PA metadata:', e.toString());
        return null;
      }
    };

    window.detectMoireFromBytes = async function (uint8Array, threshold = 100.0) {
      try {
        const blob = new Blob([uint8Array]);
        const url = URL.createObjectURL(blob);
        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          img.src = url;
        });
        URL.revokeObjectURL(url);

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const maxDim = 512;
        let w = img.width;
        let h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) {
            h = Math.round((h * maxDim) / w);
            w = maxDim;
          } else {
            w = Math.round((w * maxDim) / h);
            h = maxDim;
          }
        }
        canvas.width = w;
        canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);

        const imageData = ctx.getImageData(0, 0, w, h);
        const data = imageData.data;
        const gray = new Float32Array(w * h);
        for (let i = 0; i < data.length; i += 4) {
          gray[i / 4] = (data[i] + data[i + 1] + data[i + 2]) / 3;
        }

        const laplacian = new Float32Array(w * h);
        let sum = 0;
        let count = 0;
        for (let y = 1; y < h - 1; y++) {
          for (let x = 1; x < w - 1; x++) {
            const idx = y * w + x;
            const val = gray[idx - w] + gray[idx - 1] + gray[idx + 1] + gray[idx + w] - 4 * gray[idx];
            laplacian[idx] = val;
            sum += val;
            count++;
          }
        }
        const mean = sum / count;
        let varSum = 0;
        for (let y = 1; y < h - 1; y++) {
          for (let x = 1; x < w - 1; x++) {
            const diff = laplacian[y * w + x] - mean;
            varSum += diff * diff;
          }
        }
        const variance = varSum / count;
        console.log('Moire detection variance:', variance);
        return variance > threshold;
      } catch (e) {
        console.error('Moire detection error:', e);
        return false;
      }
    };

  </script>
</body>

</html>
