name: Deploy to Firebase Hosting Dev on Merge
on:
  push:
    branches:
      - dev
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3

      - name: Install dependencies
        run: flutter pub get

      - name: Create secrets.json
        run: echo '${{ secrets.APP_SECRETS_DEV_JSON }}' > secrets.json

      - name: Build Web
        run: flutter build web --release --source-maps --dart-define-from-file secrets.json

      - name: Upload Source Maps to Sentry
        run: dart run sentry_dart_plugin
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Deploy to Firebase Hosting Dev (Live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PIZZATHON_APP_DEV }}'
          projectId: pizzathon-app-dev
          channelId: live
          target: dev
