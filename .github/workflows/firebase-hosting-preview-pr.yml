name: Deploy Preview to Firebase Hosting Dev
on:
  pull_request:
    branches:
      - dev

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3

      - name: Install dependencies
        run: flutter pub get

      - name: Create secrets.json
        run: echo '${{ secrets.APP_SECRETS_DEV_JSON }}' > secrets.json

      - name: Build Web
        run: flutter build web --release --source-maps --pwa-strategy=none --dart-define-from-file secrets.json

      - name: Upload Source Maps to Sentry
        run: dart run sentry_dart_plugin
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Deploy Preview to Firebase Hosting Dev
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PIZZATHON_APP_DEV }}'
          projectId: pizzathon-app-dev
          target: preview-site
          channelId: live